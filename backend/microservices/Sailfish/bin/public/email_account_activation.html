  <style>

    .email_container {
      display: grid;
      place-content: center;
      /* min-height: 100vh; */
    }

    .email_wrapper {
      display: grid;
      grid-auto-flow: row;
      place-content: center;
      max-width: 306px;
      text-align: left;
    }

    .email_wrapper .logo {
      display: flex;
      gap: 16px;
      align-content: center;
      align-self: center;
      justify-content: center;
    }

    .email_wrapper .logo .wiwitan {
      height: 80px;
    }

    .email_wrapper .status {
      font-family: "Manrope";
      font-size: 20px;
      line-height: 27px;
      font-weight: 600;
      letter-spacing: -0.07px;
      margin-top: 24px;
      margin-bottom: 16px;
      text-align: center;
    }

    .email_wrapper .description {
      font-family: "Manrope";
      font-size: 14px;
      line-height: 19px;
      margin-bottom: 24px;
    }

    .email_wrapper .button {
      display: flex;
      justify-content: center;
      margin-bottom: 36px;
      text-align: center;
    }

    .email_wrapper a {
      font-family: "Manrope";
      width: 162px;
      background-color: #0D3AA1;
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      color: white;
      text-decoration: none;
      margin-bottom: 8px;
    }
  </style>
